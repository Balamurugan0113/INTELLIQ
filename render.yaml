# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  # ─── Backend API (FastAPI — Python native) ─────────────────
  - type: web
    name: intelliq-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: |
      cd backend && pip install -r requirements.txt
    startCommand: |
      cd backend && uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: DATABASE_URL
        fromDatabase:
          name: intelliq-db
          property: connectionString
      - key: ADMIN_TOKEN
        sync: false
      - key: CORS_ORIGINS
        value: "*"

  # ─── Frontend (React + Vite Static Site) ──────────────────────
  - type: web
    name: intelliq
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    envVars:
      - key: VITE_API_URL
        value: https://intelliq-api.onrender.com

# ─── PostgreSQL Database ──────────────────────────────────────
databases:
  - name: intelliq-db
    region: singapore
    plan: free
    databaseName: intelliq
    user: intelliq
    ipAllowList: []
